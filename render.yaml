# Render Blueprint — Infrastructure-as-Code for Medai Health Assistant
# https://render.com/docs/blueprint-spec

services:
  # ─── Backend: FastAPI + ChromaDB ───
  - type: web
    name: medai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your static site URL after first deploy
      - key: PYTHON_VERSION
        value: 3.11.9

  # ─── Frontend: React/Vite Static Site ───
  - type: web
    name: medai-app
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend service URL after first deploy
